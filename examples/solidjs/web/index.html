<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    {{- with index .Meta "title" }}
    <title>{{ . }}</title>
    {{- end -}}
    {{- range $k, $v := .Meta }}
    {{- if ne $k "title" }}
    <meta name="{{ $k }}" content="{{ $v }}">
    {{- end -}}
    {{- end }}

    {{ .Script }}
  </head>
  <body>
    <div id="app">{{ .App }}</div>

    {{ if not .NoHydrate }}
        <script type="module" src="{{.HydrationScriptSrc}}"></script>
    {{ end }}
  </body>
</html>
